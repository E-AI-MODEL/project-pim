name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  check:
    name: Typecheck, advisory lint, test and build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Normalize Bun lockfile registry
        run: |
          python - <<'PY'
          from pathlib import Path

          lockfile = Path('bun.lock')
          text = lockfile.read_text()
          text = text.replace(
              'https://europe-west1-npm.pkg.dev/lovable-core-prod/sandbox-npm-cache/',
              'https://registry.npmjs.org/',
          )
          lockfile.write_text(text)
          PY

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Typecheck
        run: bun run typecheck

      - name: Advisory lint
        run: bun run format && bun run lint || echo "Lint advisory failed; typecheck, tests and build remain blocking."

      - name: Test
        run: bun run test

      - name: Build
        run: bun run build

      - name: Advisory dependency audit
        run: bun audit || echo "Dependency audit advisory failed; review audit output before release."
