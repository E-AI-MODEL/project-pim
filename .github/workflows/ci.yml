name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  check:
    name: Typecheck, advisory lint, test and build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Typecheck
        run: bun run typecheck

      - name: Advisory lint
        run: bun run format && bun run lint || echo "Lint advisory failed; typecheck, tests, build and audit remain blocking."

      - name: Test
        run: bun run test

      - name: Build
        run: bun run build

      - name: Audit dependencies
        run: bun audit
